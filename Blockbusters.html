<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blockbusters Classroom Board</title>
<style>
:root{
  --bg:#eaf7ff;--blue:#1098cc;--blue-dark:#05648f;--cream:#fffdf1;--cream-shadow:#ded9c8;
  --gold:#f1c117;--line:#07090b;--select:#332207;--panel:#f6fbff;
  /* BAKED-IN LAYOUT DEFAULTS: edit these four values if needed */
  --sidebar-w:330px;--board-scale:1.10;--board-x:164px;--board-y:8px;
}
*{box-sizing:border-box}html,body{height:100%}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:#102331;background:linear-gradient(135deg,#d8ebf6,#fbfdff 50%,#cfe5f3);display:grid;place-items:center;padding:10px}
.app{width:min(1280px,100%);height:min(910px,calc(100vh - 20px));min-height:620px;background:var(--panel);border:4px solid #d5dce3;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.20),inset 0 0 0 2px white;overflow:hidden;display:grid;grid-template-columns:1fr var(--sidebar-w);grid-template-rows:auto 1fr auto auto;grid-template-areas:"topbar topbar" "stage controls" "status controls" "help controls"}
.topbar{grid-area:topbar;display:grid;place-items:center;padding:12px 16px 10px;background:linear-gradient(#fff,#dcecf7);border-bottom:4px solid #09283b}
.title{margin:0;text-align:center;letter-spacing:.07em;text-transform:uppercase;font-family:Impact,"Arial Black",system-ui,sans-serif;font-size:clamp(2.6rem,5.5vw,5.4rem);line-height:.86;color:#0b9bd7;-webkit-text-stroke:2px #073451;text-shadow:3px 3px 0 #74c3e8,6px 6px 0 rgba(0,0,0,.14);transform:skewX(-4deg)}
.controls-panel{grid-area:controls;display:flex;flex-direction:column;gap:12px;padding:14px;background:linear-gradient(180deg,#fff,#dcecf7);border-left:4px solid #09283b;overflow:auto}.controls{display:flex;flex-direction:column;gap:10px}.control-heading{margin:0 0 2px;font-weight:900;color:#173447;text-align:center}
button{border:3px solid #102333;background:#fff;color:#102333;border-radius:999px;padding:10px 14px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.25);user-select:none;width:100%}button:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.25)}button.award-blue{background:var(--blue);color:white}button.award-white{background:var(--cream);color:#102333}button:disabled{opacity:.45;cursor:not-allowed;filter:saturate(.4);transform:none;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.stage{grid-area:stage;display:grid;place-items:center start;overflow:hidden;background:linear-gradient(90deg,rgba(17,170,218,.95) 0 7%,transparent 7% 93%,rgba(17,170,218,.95) 93% 100%),var(--bg)}.svg-wrap{width:100%;height:100%;display:grid;place-items:center;transform:translate(var(--board-x),var(--board-y)) scale(var(--board-scale));transform-origin:center center}svg{width:min(1180px,100%);height:100%;display:block;overflow:visible}
.hex-shape{stroke:var(--line);stroke-width:4.5;stroke-linejoin:round;vector-effect:non-scaling-stroke}.letter-cell .hex-shape{fill:var(--gold)}.edge-blue .hex-shape{fill:url(#blueGrad)}.edge-white .hex-shape{fill:url(#creamGrad)}.inner{pointer-events:none;stroke:none;opacity:.9}.letter-cell .inner{fill:url(#goldGrad)}.letter-cell.blue .inner{fill:url(#claimedBlueGrad)}.letter-cell.white .inner{fill:url(#claimedWhiteGrad)}.edge-blue .inner{fill:url(#blueInnerGrad)}.edge-white .inner{fill:url(#whiteInnerGrad)}.letter-cell.blue .hex-shape{fill:var(--blue-dark)}.letter-cell.white .hex-shape{fill:var(--cream-shadow)}
.letter{pointer-events:none;text-anchor:middle;dominant-baseline:central;font-family:"Courier New",Consolas,monospace;font-size:72px;fill:#060707}.letter-cell.blue .letter{fill:white;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.45))}.letter-cell.white .letter{fill:#070707}.letter-cell{cursor:pointer;transition:filter .12s ease,transform .12s ease;transform-box:fill-box;transform-origin:center;outline:none}.letter-cell:focus,.letter-cell:focus-visible,svg *:focus,svg *:focus-visible{outline:none}.letter-cell:hover{filter:brightness(1.08);transform:scale(1.012)}
.letter-cell.selected .hex-shape{fill:var(--select);stroke:#ffec72;stroke-width:7;animation:pulseStroke .7s infinite alternate ease-in-out}.letter-cell.selected .inner{fill:#6d4b08;animation:pulseInner .7s infinite alternate ease-in-out}.letter-cell.selected .letter{fill:#111;animation:pulseLetter .7s infinite alternate ease-in-out}@keyframes pulseStroke{from{stroke:#ffec72;filter:drop-shadow(0 0 1px #ffe45f)}to{stroke:#fff9bf;filter:drop-shadow(0 0 10px #ffe45f)}}@keyframes pulseInner{from{opacity:.72}to{opacity:1}}@keyframes pulseLetter{from{fill:#070707}to{fill:#fff2a4}}
.status{grid-area:status;margin:0;padding:12px 16px 14px;text-align:center;font-weight:900;background:#9c1434;color:#ffe56c;border-top:4px solid #45101e;box-shadow:inset 0 3px 0 #e0bd2a}.help{grid-area:help;margin:0;padding:9px 16px 13px;text-align:center;color:#405867;background:#f7fbff;font-size:.94rem}
@media(max-width:900px){.app{height:calc(100vh - 12px);min-height:560px;border-width:2px;border-radius:16px;grid-template-columns:1fr;grid-template-rows:auto auto 1fr auto auto;grid-template-areas:"topbar" "controls" "stage" "status" "help"}.topbar{padding:8px}.title{font-size:2.5rem;-webkit-text-stroke:1px #073451}.controls-panel{border-left:0;border-bottom:4px solid #09283b;padding:8px}.controls{flex-direction:row;flex-wrap:wrap;justify-content:center;gap:7px}.control-heading{display:none}button{width:auto;border-width:2px;padding:8px 10px;font-size:.9rem}.letter{font-size:62px}.hex-shape{stroke-width:3.5}.letter-cell.selected .hex-shape{stroke-width:5.5}.help{font-size:.85rem}.svg-wrap{transform:translate(0,0) scale(1)}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><h1 class="title">Blockbusters</h1></header>
<main class="stage"><div class="svg-wrap"><svg id="boardSvg" viewBox="0 0 1210 690" role="img" aria-label="Tessellated Blockbusters board"></svg></div></main>
<aside class="controls-panel" aria-label="Blockbusters controls"><p class="control-heading">Game controls</p><section class="controls"><button id="newBoard" type="button">Regenerate random board</button><button id="resetColours" type="button">Reset colours</button><button id="awardBlue" class="award-blue" type="button" disabled>Award selected to Blue</button><button id="awardWhite" class="award-white" type="button" disabled>Award selected to White</button><button id="clearSelected" type="button" disabled>Clear selected</button></section></aside>
<p id="status" class="status">Click a letter hexagon to select it. The selected hexagon will pulse; then award it to Blue or White.</p>
<p class="help">Blue aims left-to-right; White aims top-to-bottom. Keyboard shortcuts: B awards selected to Blue, W awards selected to White, Escape clears the selection.</p>
</div>
<script>
const letters="ABCDEFGHIJKLMNOPQRSTUVWYZ".split(""),svg=document.getElementById("boardSvg"),status=document.getElementById("status"),newBoardBtn=document.getElementById("newBoard"),resetBtn=document.getElementById("resetColours"),awardBlueBtn=document.getElementById("awardBlue"),awardWhiteBtn=document.getElementById("awardWhite"),clearSelectedBtn=document.getElementById("clearSelected"),NS="http://www.w3.org/2000/svg",SIZE=62,HEX_H=Math.sqrt(3)*SIZE,DX=SIZE*1.5,DY=HEX_H,ORIGIN_X=235,ORIGIN_Y=95,centralCols=5,centralRows=5;let selectedCell=null;
function shuffle(a){const c=[...a];for(let i=c.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[c[i],c[j]]=[c[j],c[i]]}return c}
function hexCentre(col,row){return{x:ORIGIN_X+col*DX,y:ORIGIN_Y+row*DY+(col%2?DY/2:0)}}
function points(cx,cy,scale=1){const s=SIZE*scale,pts=[];for(let i=0;i<6;i++){const angle=Math.PI/180*(60*i);pts.push(`${(cx+s*Math.cos(angle)).toFixed(2)},${(cy+s*Math.sin(angle)).toFixed(2)}`)}return pts.join(" ")}
function makeDefs(){const defs=document.createElementNS(NS,"defs");defs.innerHTML=`<linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe15a"/><stop offset="1" stop-color="#e7b30a"/></linearGradient><linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#4db7dd"/><stop offset="1" stop-color="#087caf"/></linearGradient><linearGradient id="blueInnerGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#62c6e6"/><stop offset="1" stop-color="#1296c9"/></linearGradient><linearGradient id="creamGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#eee9d8"/></linearGradient><linearGradient id="whiteInnerGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fffbee"/></linearGradient><linearGradient id="claimedBlueGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#35bee9"/><stop offset="1" stop-color="#0788bf"/></linearGradient><linearGradient id="claimedWhiteGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#fff8df"/></linearGradient>`;svg.appendChild(defs)}
function makeHexGroup({col,row,kind,letter=""}){const {x,y}=hexCentre(col,row),g=document.createElementNS(NS,"g");g.classList.add(kind);g.dataset.letter=letter;const outer=document.createElementNS(NS,"polygon");outer.setAttribute("points",points(x,y,1));outer.setAttribute("class","hex-shape");g.appendChild(outer);const inner=document.createElementNS(NS,"polygon");inner.setAttribute("points",points(x,y,.73));inner.setAttribute("class","inner");g.appendChild(inner);if(letter){const t=document.createElementNS(NS,"text");t.setAttribute("x",x);t.setAttribute("y",y+2);t.setAttribute("class","letter");t.textContent=letter;g.appendChild(t)}return g}
function updateButtons(){const has=!!selectedCell;awardBlueBtn.disabled=!has;awardWhiteBtn.disabled=!has;clearSelectedBtn.disabled=!has}
function setSelected(cell){if(selectedCell)selectedCell.classList.remove("selected");selectedCell=cell;if(cell){cell.classList.add("selected");status.textContent=`${cell.dataset.letter} selected. Award it to Blue or White, or clear the selection.`}else status.textContent="No hexagon selected. Click a letter hexagon to select it.";updateButtons()}
function awardSelected(colour){if(!selectedCell)return;selectedCell.classList.remove("blue","white");selectedCell.classList.add(colour);const l=selectedCell.dataset.letter;status.textContent=`${l} awarded to ${colour.toUpperCase()}. Choose the next letter.`;setSelected(null)}
function clearSelectedOwner(){if(!selectedCell)return;const l=selectedCell.dataset.letter;selectedCell.classList.remove("blue","white");status.textContent=`${l} returned to unclaimed.`;setSelected(null)}
function resetColours(){document.querySelectorAll(".letter-cell").forEach(c=>c.classList.remove("blue","white","selected"));selectedCell=null;updateButtons();status.textContent="All awarded hexagons cleared."}
function renderBoard(){svg.innerHTML="";makeDefs();setSelected(null);const bg=[];for(let r=-1;r<centralRows;r++){bg.push({col:-1,row:r,kind:"edge-blue"},{col:centralCols,row:r,kind:"edge-blue"})}for(let c=0;c<centralCols;c++){bg.push({col:c,row:-1,kind:"edge-white"},{col:c,row:centralRows,kind:"edge-white"})}bg.forEach(cell=>svg.appendChild(makeHexGroup(cell)));let i=0;shuffle(letters).forEach(letter=>{const row=Math.floor(i/5),col=i%5,g=makeHexGroup({col,row,kind:"letter-cell",letter});g.setAttribute("tabindex","0");g.setAttribute("role","button");g.addEventListener("click",()=>setSelected(g));svg.appendChild(g);i++});status.textContent="New tessellated board ready. Click a letter to select it, then award it to Blue or White."}
newBoardBtn.addEventListener("click",renderBoard);resetBtn.addEventListener("click",resetColours);awardBlueBtn.addEventListener("click",()=>awardSelected("blue"));awardWhiteBtn.addEventListener("click",()=>awardSelected("white"));clearSelectedBtn.addEventListener("click",clearSelectedOwner);document.addEventListener("keydown",e=>{if(e.key.toLowerCase()==="b")awardSelected("blue");if(e.key.toLowerCase()==="w")awardSelected("white");if(e.key==="Escape")setSelected(null)});renderBoard();
</script>
</body>
</html>
