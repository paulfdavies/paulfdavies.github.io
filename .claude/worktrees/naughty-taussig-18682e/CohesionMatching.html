<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cohesion Matching Exercise</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; background-color: #f4f4f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .exercise-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .column { display: flex; flex-direction: column; gap: 10px; }
        .term { padding: 10px; background: #e3f2fd; border: 2px solid #2196f3; border-radius: 4px; cursor: grab; text-align: center; font-weight: bold; }
        .drop-zone { padding: 15px; border: 2px dashed #ccc; border-radius: 4px; min-height: 50px; background: #fafafa; display: flex; align-items: center; justify-content: center; text-align: center; }
        .drop-zone.over { border-color: #2196f3; background: #e3f2fd; }
        .drop-zone.correct { border-color: #4caf50; background: #c8e6c9; border-style: solid; }
        .example-text { font-style: italic; margin-bottom: 5px; display: block; width: 100%; }
        .feedback { text-align: center; margin-top: 20px; font-weight: bold; color: #4caf50; min-height: 24px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cohesion Matching Exercise</h1>
    <p>Drag the <strong>Cohesive Factor</strong> from the left onto its corresponding <strong>Example</strong> on the right.</p>
    
    <div class="exercise-grid">
        <div class="column" id="terms">
            </div>
        <div class="column" id="examples">
            </div>
    </div>
    <div id="feedback" class="feedback"></div>
</div>

<script>
    const data = [
        { term: "Connectives", example: "I love Jazz. However, Johnny hates it." },
        { term: "Repetition", example: "It was the best of times, it was the worst of times." },
        { term: "Lexical Relationships", example: "He drove a Skoda. The old rustbucket wouldn't start." },
        { term: "Substitution", example: "I've got a pen. Do you have one?" },
        { term: "Co-reference", example: "A woman approached... She put the umbrella down." },
        { term: "Comparison", example: "I like cats. Dogs are better, though." },
        { term: "Ellipsis", example: "Where did you see the car? [I saw it] Outside." },
        { term: "Anaphoric Reference", example: "Dave? He's a sly one." },
        { term: "Cataphoric Reference", example: "I'm trying to say this: I love you." }
    ];

    const termsContainer = document.getElementById('terms');
    const examplesContainer = document.getElementById('examples');
    const feedback = document.getElementById('feedback');

    // Shuffle helper
    const shuffle = (array) => array.sort(() => Math.random() - 0.5);

    function initGame() {
        const shuffledData = shuffle([...data]);
        const shuffledTerms = shuffle([...data]);

        shuffledTerms.forEach(item => {
            const termEl = document.createElement('div');
            termEl.className = 'term';
            termEl.textContent = item.term;
            termEl.draggable = true;
            termEl.id = `term-${item.term.replace(/\s+/g, '')}`;
            termEl.addEventListener('dragstart', e => e.dataTransfer.setData('text', item.term));
            termsContainer.appendChild(termEl);
        });

        shuffledData.forEach(item => {
            const wrapper = document.createElement('div');
            wrapper.className = 'drop-zone';
            wrapper.innerHTML = `<span class="example-text">"${item.example}"</span>`;
            wrapper.dataset.match = item.term;

            wrapper.addEventListener('dragover', e => e.preventDefault());
            wrapper.addEventListener('dragenter', e => wrapper.classList.add('over'));
            wrapper.addEventListener('dragleave', e => wrapper.classList.remove('over'));
            
            wrapper.addEventListener('drop', e => {
                e.preventDefault();
                wrapper.classList.remove('over');
                const draggedTerm = e.dataTransfer.getData('text');
                
                if (draggedTerm === wrapper.dataset.match) {
                    wrapper.classList.add('correct');
                    wrapper.innerHTML = `<strong>${draggedTerm}</strong>: <em>"${item.example}"</em>`;
                    feedback.textContent = "Correct!";
                    // Remove the dragged element
                    const termElements = document.querySelectorAll('.term');
                    termElements.forEach(el => {
                        if(el.textContent === draggedTerm) el.style.visibility = 'hidden';
                    });
                    checkWin();
                } else {
                    feedback.textContent = "Try again!";
                    feedback.style.color = "#f44336";
                    setTimeout(() => { feedback.style.color = "#4caf50"; }, 1000);
                }
            });
            examplesContainer.appendChild(wrapper);
        });
    }

    function checkWin() {
        const correctCount = document.querySelectorAll('.drop-zone.correct').length;
        if (correctCount === data.length) {
            feedback.textContent = "Well done! You've matched all cohesive factors!";
        }
    }

    initGame();
</script>

</body>
</html>
