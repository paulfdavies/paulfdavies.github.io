<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb & Preposition Generator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        margin: 0;
        padding: 20px;
        text-align: center;
    }
    h1 {
        color: #333;
    }
    .container {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-top: 30px;
        flex-wrap: wrap;
    }
    .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        padding: 20px;
        width: 200px;
        text-align: center;
    }
    .text {
        font-size: 1.4em;
        font-weight: bold;
        color: #007acc;
        margin-bottom: 15px;
    }
    button {
        background: #007acc;
        color: #fff;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
    }
    button:hover {
        background: #005fa3;
    }
</style>
</head>
<body>
    <h1>Verb & Preposition Generator</h1>
    <div class="container">
        <!-- Verb Card -->
        <div class="card">
            <div class="text" id="verb">I ran...</div>
            <button onclick="newVerb()">New Starter</button>
        </div>
        <!-- Preposition Card -->
        <div class="card">
            <div class="text" id="prep">of</div>
            <button onclick="newPrep()">New Preposition</button>
        </div>
    </div>

<script>
    const verbs = [
        "I ran...", "Working...", "Taken...", "Going...", "Waiting...",
        "Prepared...", "Building something...", "I was focused...", "He was engaged...",
        "She watched it...", "Turning it...", "Coming...", "Guided...", "Thinking...",
        "Concerned...", "Acting...", "Diving...", "I'll finish...",
        "Feeling happy...", "Passing...", "Moving...", "Following him...", "Choosing...",
        "Making dinner...", "Sorting...", "Fighting...", "It happened..."
    ];

    const prepositions = [
        "of", "in", "to", "for", "with", "on", "at", "from", "by", "about",
        "as", "into", "like", "through", "after", "over", "between", "outside",
        "against", "during"
    ];

    function newVerb() {
        const randomVerb = verbs[Math.floor(Math.random() * verbs.length)];
        document.getElementById("verb").textContent = randomVerb;
    }

    function newPrep() {
        const randomPrep = prepositions[Math.floor(Math.random() * prepositions.length)];
        document.getElementById("prep").textContent = randomPrep;
    }
</script>
